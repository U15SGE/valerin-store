<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALERIN</title>

<style>
body { margin:0; font-family:Arial; background:black; color:white; }

.navbar {
  display:flex; justify-content:space-between; padding:20px;
  border-bottom:1px solid #222;
}

.nav-links a { margin:0 10px; color:white; text-decoration:none; }

.btn { background:gold; color:black; padding:10px 20px; cursor:pointer; }

.product {
  border:1px solid #333; padding:20px; text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:40px;
}

.modal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none; justify-content:center; align-items:center;
}

.modal-box {
  background:#111; padding:30px; border:1px solid gold;
}

input {
  display:block; margin:10px 0; padding:10px; width:200px;
}
</style>
</head>

<body>

<div class="navbar">
  <div>VALERIN</div>
  <div class="nav-links">
    <a href="#">MEN</a>
    <a href="#">WOMEN</a>
    <a href="#">UNISEX</a>
  </div>
  <div>
    <span id="userBtn" onclick="openAuth()">Login</span>
    |
    <span onclick="openCart()">Cart (<span id="cartCount">0</span>)</span>
  </div>
</div>

<h1 style="text-align:center;">Luxury Watches</h1>

<div class="grid">
  <div class="product">
    Watch 1<br>₹5000<br>
    <button class="btn" onclick="addToCart('Watch 1')">Add to Cart</button>
  </div>
  <div class="product">
    Watch 2<br>₹7000<br>
    <button class="btn" onclick="addToCart('Watch 2')">Add to Cart</button>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal" id="authModal">
  <div class="modal-box">
    <h3>Login / Signup</h3>
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">
    <button class="btn" onclick="login()">Submit</button>
  </div>
</div>

<!-- CART MODAL -->
<div class="modal" id="cartModal">
  <div class="modal-box">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let user = localStorage.getItem("user");

updateCart();

function addToCart(item){
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
  alert("Added to cart");
}

function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;
}

function openCart(){
  document.getElementById("cartModal").style.display="flex";
  document.getElementById("cartItems").innerHTML = cart.join("<br>");
}

function openAuth(){
  document.getElementById("authModal").style.display="flex";
}

function login(){
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;

  if(!email || !phone){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("user", email);
  document.getElementById("userBtn").innerText = email;
  document.getElementById("authModal").style.display="none";
}

if(user){
  document.getElementById("userBtn").innerText = user;
}
</script>

</body>
</html>
