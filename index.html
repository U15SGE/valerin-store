<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALERIN</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

/* 🔥 Splash screen */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* Logo animation */
#logo {
  width: 140px;
  animation: rotateLogo 2s ease;
}

@keyframes rotateLogo {
  0% {
    transform: rotate(0deg) scale(0.5);
    opacity: 0;
  }
  100% {
    transform: rotate(360deg) scale(1);
    opacity: 1;
  }
}

/* Main hidden initially */
#main {
  display: none;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid #222;
}

.nav-links a {
  margin: 0 10px;
  text-decoration: none;
  color: white;
}

.cart {
  border: 1px solid gold;
  padding: 5px 10px;
}

/* Hero */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 60px;
}

</style>
</head>

<body>

<!-- 🔥 Splash -->
<div id="splash">
  <img src="logo.png" id="logo">
</div>

<!-- 🔥 Main site -->
<div id="main">

<div class="navbar">
  <div>VALERIN</div>

  <div class="nav-links">
    <a href="#">MEN</a>
    <a href="#">WOMEN</a>
    <a href="#">UNISEX</a>
  </div>

  <div class="cart">Cart</div>
</div>

<div class="hero">
  <h1>Luxury Watches</h1>
</div>

</div>

<script>
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2000);
</script>

</body>
</html>
